name: Deploy

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [14.x]
    steps:
      - uses: actions/checkout@v2
        with:
          node-version: ${{ matrix.node-version }}
      - name: Set Git User
        run: |
          git config --global user.name "lisarnjs"
          git config --global user.email "kwonenseo@gmail.com"
      - name: Run build script
        run: |
          npm install
          npm run deploy